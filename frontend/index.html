<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text-to-SQL Lab (Fase 2 Mejora)</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar Historial -->
        <aside class="history-sidebar">
            <div class="history-header">
                <h2>Historial</h2>
                <div class="history-filters">
                    <button class="filter-btn active" data-filter="all">Todos</button>
                    <button class="filter-btn" data-filter="success">Éxito</button>
                    <button class="filter-btn" data-filter="error">Error</button>
                </div>
            </div>
            <div class="history-list" id="historyList">
                <!-- Items de historial cargados por JS -->
            </div>
        </aside>

        <!-- Chat Container -->
        <div class="chat-container">
            <header class="chat-header">
            <div>
                <h1>Text-to-SQL Assistant</h1>
                <p>Tu asistente para consultas a bases de datos</p>
            </div>
            <div class="header-controls">
                <select id="providerSelect"></select>
                <select id="modelSelect"></select>
            </div>
        </header>

        <main class="chat-area" id="chatArea">
            <div class="welcome-message">
                <h2>¡Hola! ¿Qué deseas consultar hoy?</h2>
                <div class="examples-grid">
                    <button class="example-btn">¿Qué cliente tiene más órdenes completadas?</button>
                    <button class="example-btn">¿Cuántos tickets críticos siguen abiertos?</button>
                    <button class="example-btn">¿Cuál es el monto total de órdenes por ciudad?</button>
                    <button class="example-btn">¿Qué clientes tienen pedidos pendientes?</button>
                    <button class="example-btn">Muéstrame tickets abiertos con prioridad alta</button>
                </div>
                <div class="note">Si no tienes API keys, puedes usar el proveedor <b>Mock</b>.</div>
            </div>
        </main>

        <footer class="chat-input-area">
            <div class="input-wrapper">
                <textarea id="questionInput" rows="1" placeholder="Escribe tu consulta aquí... (Shift+Enter para nueva línea)"></textarea>
                <button id="runBtn" class="send-btn" title="Enviar consulta">
                    <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                </button>
            </div>
            </footer>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
