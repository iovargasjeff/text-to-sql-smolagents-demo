<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Text-to-SQL Lab (Fase 2 Mejora)</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="app-layout">
        <!-- Sidebar Historial -->
        <aside class="history-sidebar">
            <div class="history-header">
                <h2 data-i18n="historyTitle">Historial</h2>
                <div class="history-filters">
                    <button class="filter-btn active" data-filter="all" data-i18n="filterAll">Todos</button>
                    <button class="filter-btn" data-filter="success" data-i18n="filterSuccess">Éxito</button>
                    <button class="filter-btn" data-filter="error" data-i18n="filterError">Error</button>
                </div>
            </div>
            <div class="history-list" id="historyList">
                <!-- Items de historial cargados por JS -->
            </div>
        </aside>

        <!-- Chat Container -->
        <div class="chat-container">
            <header class="chat-header">
                <div>
                    <h1 data-i18n="appTitle">Text-to-SQL Assistant</h1>
                    <p data-i18n="appSubtitle">Tu asistente para consultas a bases de datos</p>
                </div>
                <div class="header-controls">
                    <button id="langToggle" class="lang-btn">🇺🇸 English</button>
                    <select id="providerSelect" class="provider-select" title="Selecciona Proveedor"></select>
                    <select id="modelSelect" class="model-select" title="Selecciona Modelo"></select>
                </div>
            </header>

            <main class="chat-area" id="chatArea">
                <div class="welcome-message">
                    <h2 data-i18n="welcomeTitle">¡Hola! ¿En qué puedo ayudarte hoy?</h2>
                    <p data-i18n="welcomeDesc">Escribe una pregunta sobre tus datos y la convertiré en una consulta SQL.</p>
                    <div class="examples-grid">
                        <button class="example-btn" data-i18n="example1">¿Qué clientes hicieron pedidos en 2023?</button>
                        <button class="example-btn" data-i18n="example2">Muestra el top 5 de productos más vendidos</button>
                        <button class="example-btn" data-i18n="example3">Total de ingresos por mes</button>
                    </div>
                    <div class="note" data-i18n="mockNote">Si no tienes API keys, puedes usar el proveedor <b>Mock</b>.</div>
                </div>
            </main>

            <footer class="chat-input-area">
                <div class="input-wrapper">
                    <textarea id="questionInput" data-i18n-placeholder="inputPlaceholder" placeholder="Ej: ¿Cuáles son los clientes con más compras?" rows="1"></textarea>
                    <button id="runBtn" class="send-btn" title="Ejecutar Consulta" data-i18n-title="runBtnTitle">
                        <svg viewBox="0 0 24 24" fill="currentColor" width="24" height="24"><path d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"></path></svg>
                    </button>
                </div>
            </footer>
        </div>
    </div>
    <script src="app.js"></script>
</body>
</html>
